{% load sekizai_tags %}

{% if page and page.custom_css %}
{% addtoblock 'css' %}
{% for css_file in page.custom_css %}
<link rel="stylesheet" href="{{ css_file }}?{{ current_version }}">
{% endfor %}
{% endaddtoblock %}
{% endif %}

{% if page and page.custom_js %}
{% addtoblock 'js' %}
{% for js_file in page.custom_js %}
<script src="{{ js_file }}?{{ current_version }}"></script>
{% endfor %}
{% endaddtoblock %}
{% endif %}
