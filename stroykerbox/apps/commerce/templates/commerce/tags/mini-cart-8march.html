{% load static catalog_tags commerce_tags utils_tags thumbnail %}
{# Шаблон мини-корзины 8 марта (все позиции, скролл в теле панели). Подключается через includes/mini_cart_8march.html. #}
<div class="mini-cart-8march" id="mini-cart-8march-panel" aria-hidden="true">
  <div class="mini-cart-8march__overlay" data-mini-cart-8march-close aria-label="Закрыть"></div>
  <div class="mini-cart-8march__drawer">
    <div class="mini-cart-8march__head">
      <h2 class="mini-cart-8march__title big-title">КОРЗИНА</h2>
      <button type="button" class="mini-cart-8march__close" data-mini-cart-8march-close aria-label="Закрыть">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div id="mini-cart-8march-sync" class="mini-cart-8march__sync">
      {% include 'commerce/tags/mini-cart-8march-inner.html' %}
    </div>
  </div>
</div>
<script>
(function() {
  var panel = document.getElementById('mini-cart-8march-panel');
  if (!panel) return;
  function openMiniCart(e) {
    if (e) e.preventDefault();
    /* Актуальное содержимое с сервера при каждом открытии (счётчик уже мог обновиться через add-to-cart). */
    if (typeof window.refreshMiniCart8marchPanelHtml === 'function') {
      window.refreshMiniCart8marchPanelHtml();
    }
    panel.classList.add('mini-cart-8march--open');
    panel.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeMiniCart() {
    panel.classList.remove('mini-cart-8march--open');
    panel.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  function init() {
    document.querySelectorAll('[data-mini-cart-8march-open]').forEach(function(btn) {
      btn.addEventListener('click', openMiniCart);
    });
    panel.querySelectorAll('[data-mini-cart-8march-close]').forEach(function(btn) {
      btn.addEventListener('click', closeMiniCart);
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && panel.classList.contains('mini-cart-8march--open')) closeMiniCart();
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
