{% extends 'base.html' %}
{% load static sekizai_tags utils_tags %}

{% block content %}


{% block content_body %}{% endblock content_body %}

{% addtoblock 'css' %}
<style>
#yamap_addresses {
    width: 100%;
    height: 500px;
    padding: 0;
    margin: 0;
}
</style>
{% endaddtoblock %}

{% addtoblock 'js' %}
<script src="https://api-maps.yandex.ru/2.1/?apikey={% settings_value 'YANDEX_API_KEY' %}&lang=ru_RU" type="text/javascript"></script>
{# <script src="{% static 'addresses/js/addresses_yamap.js' %}"></script> #}
<script src="{% static 'js/addresses_yamap.js' %}"></script>
{% endaddtoblock %}


<div id="yamap_addresses"
     data-center-latitude="{{ center_latitude|stringformat:'f' }}"
     data-center-longitude="{{ center_longitude|stringformat:'f' }}"
     data-center-zoom="{{ center_zoom|stringformat:'f' }}"></div>


{% endblock content %}
