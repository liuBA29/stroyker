{# Отдельный тег футера 8 марта: только скрипт открытия модалки по кнопке «ПЕРЕЗВОНИТЕ МНЕ». Сама модалка (#callme-modal) подключается в base.html в block bottom. #}
<script>
(function(){
  var overlayId = 'callme-modal-overlay-8march';
  function openCallmeModal() {
    var modal = document.getElementById('callme-modal');
    if (!modal) return;
    var opened = false;
    if (typeof window.jQuery !== 'undefined' && window.jQuery.fancybox && window.jQuery.fancybox.open) {
      try {
        window.jQuery.fancybox.open(window.jQuery(modal));
        opened = true;
      } catch (err) {}
    }
    if (!opened) {
      modal.classList.add('callme-modal--open');
      var overlay = document.getElementById(overlayId);
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = overlayId;
        overlay.className = 'callme-modal-overlay-8march';
        overlay.setAttribute('aria-hidden', 'true');
        document.body.appendChild(overlay);
        document.addEventListener('click', callmeFallbackCloseOnClick);
      }
      overlay.style.display = '';
      overlay.classList.add('callme-modal-overlay-8march--visible');
      document.body.classList.add('callme-modal-open');
    }
  }
  function closeCallmeModalFallback() {
    var modal = document.getElementById('callme-modal');
    if (modal) modal.classList.remove('callme-modal--open');
    var overlay = document.getElementById(overlayId);
    if (overlay) {
      overlay.style.display = 'none';
      overlay.classList.remove('callme-modal-overlay-8march--visible');
    }
    document.body.classList.remove('callme-modal-open');
  }
  function callmeFallbackCloseOnClick(e) {
    if (!document.body.classList.contains('callme-modal-open')) return;
    var t = e.target;
    var overlay = document.getElementById(overlayId);
    var modal = document.getElementById('callme-modal');
    var isOverlay = t === overlay;
    var isCloseBtn = modal && modal.contains(t) && (t.getAttribute('data-fancybox-close') !== null || (t.classList && t.classList.contains('callme-8march__close')));
    if (isOverlay || isCloseBtn) {
      e.preventDefault();
      e.stopPropagation();
      closeCallmeModalFallback();
    }
  }
  document.addEventListener('click', function(e) {
    var btn = e.target && (e.target.closest ? e.target.closest('a.callme-button') : null);
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    openCallmeModal();
  }, true);
})();
</script>
