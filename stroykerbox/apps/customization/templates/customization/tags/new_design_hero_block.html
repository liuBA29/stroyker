{% load static %}
<section class="index-hero-8march" aria-roledescription="carousel" aria-label="Промо-баннеры">
  <div class="index-hero-8march__slides">
    <div class="index-hero-8march__track" id="hero-carousel-track">
      <div class="index-hero-8march__slide" data-hero-slide="0">
        <div class="index-hero-8march__inner">
          <div class="index-hero-8march__left">
            <img src="{% static 'images/8march_rect.png' %}" alt="8 марта" class="index-hero-8march__img" role="presentation" loading="lazy" decoding="async">
            <div class="index-hero-8march__8march-card">
              <img src="{% static '8march_design/images/LUCIANO/Logo.svg' %}" alt="LUCIANO" class="index-hero-8march__logo" loading="lazy" decoding="async">
              <span class="index-hero-8march__8march-number index-hero-8march__8march-number--image-fill" style="background-image: url('{% static 'images/8march_rect.png' %}');">8</span>
              <span class="index-hero-8march__8march-month index-hero-8march__8march-month--image-fill" style="background-image: url('{% static 'images/8march_rect.png' %}');">марта</span>
              <p class="index-hero-8march__8march-slogan">Скажите цветами то, что<br>невозможно выразить словами</p>
            </div>
          </div>
          <div class="index-hero-8march__right">
            <p class="index-hero-8march__text">БУКЕТЫ СПЕЦИАЛЬНО<br>ДЛЯ НЕЕ</p>
            <p class="index-hero-8march__subtext">СКИДКА 10%</p>
            <a href="{% url 'catalog:category' '8-marta' %}" class="index-hero-8march__btn black-button">ВЫБРАТЬ БУКЕТ</a>
          </div>
        </div>
      </div>
      <div class="index-hero-8march__slide" data-hero-slide="1">
        <div class="index-hero-8march__inner">
          <div class="index-hero-8march__left">
            <img src="{% static '8march_design/images/LUCIANO/1.png' %}" alt="" class="index-hero-8march__img" role="presentation">
            <div class="index-hero-8march__logo-box">
              <img src="{% static '8march_design/images/LUCIANO/Logo.svg' %}" alt="LUCIANO" class="index-hero-8march__logo">
            </div>
          </div>
          <div class="index-hero-8march__right">
            <p class="index-hero-8march__text">ДОСТАВКА ЦВЕТОВ<br>И БУКЕТОВ</p>
            <a href="{% url 'catalog:index' %}" class="index-hero-8march__btn black-button">В КАТАЛОГ</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="index-hero-8march__nav" aria-hidden="true">
    <button type="button" class="index-hero-8march__arrow pink-arrows index-hero-8march__arrow--prev" title="Назад" aria-label="Предыдущий слайд">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button type="button" class="index-hero-8march__arrow pink-arrows index-hero-8march__arrow--next" title="Вперёд" aria-label="Следующий слайд">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</section>
