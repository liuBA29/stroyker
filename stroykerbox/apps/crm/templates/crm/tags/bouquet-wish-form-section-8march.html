{% load static utils_tags common_tags %}
{# Форма «Букет по вашим желаниям» для страницы 8 марта. Подключается в 8march_design_test.html. Логика: crm:feedback-message-request, как форма обратной связи. #}
<div class="index-bouquet-wish-8march__form-wrap">
  <form action="{% url 'crm:feedback-message-request' %}"
        method="post"
        id="feedback-bouquet-wish-form"
        class="index-bouquet-wish-8march__form"
        onsubmit="{% render_yandex_metrika_goal config.YMETRICA_GOAL_FORM_FEEDBACK %}">
    {% csrf_token %}
    {% for f in feedback_form.hidden_fields %}{{ f }}{% endfor %}
    <div class="index-bouquet-wish-8march__field form-group">
      <input type="text" name="name" class="index-bouquet-wish-8march__input" placeholder="Ваше имя" required>
    </div>
    <div class="index-bouquet-wish-8march__field form-group">
      <input type="tel" name="phone" class="index-bouquet-wish-8march__input index-bouquet-wish-8march__input--phone" placeholder="+7 (___) ___ - __ - __" required autocomplete="tel">
    </div>
    <div class="index-bouquet-wish-8march__field index-bouquet-wish-8march__field--with-icon form-group">
      <input type="text" name="delivery_date" id="feedback-bouquet-wish-delivery-date" class="index-bouquet-wish-8march__input" placeholder="Дата доставки" autocomplete="off" readonly>
      <span class="index-bouquet-wish-8march__field-icon index-bouquet-wish-8march__field-icon--date-trigger" aria-hidden="true" title="Выбрать дату">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="13" rx="1"/><path d="M3 8h14"/><path d="M7 2v4"/><path d="M13 2v4"/></svg>
      </span>
    </div>
    <div class="index-bouquet-wish-8march__field form-group">
      <input type="email" name="email" class="index-bouquet-wish-8march__input" placeholder="Email">
    </div>
    <div class="index-bouquet-wish-8march__field form-group">
      <textarea name="message" class="index-bouquet-wish-8march__input index-bouquet-wish-8march__textarea" placeholder="Пожелания" rows="1"></textarea>
    </div>
    <button type="submit" class="index-bouquet-wish-8march__submit black-button">ОТПРАВИТЬ</button>
    <div class="form-group privacy-policy index-bouquet-wish-8march__agreement">
      <div class="checkbox">
        <input type="checkbox" name="privacy-policy" id="privacy-bouquet-wish" required autocomplete="off" class="green-checkbox">
        <label for="privacy-bouquet-wish">Нажимая на кнопку, вы даете согласие на обработку персональных данных и рекламную рассылку,
и соглашаетесь с нашей <a href="{% url 'staticpages:staticpage' 'privacy-policy' %}">политикой конфиденциальности</a></label>
      </div>
    </div>
  </form>
  <script>
  (function(){
    function getCsrfToken() {
      var name = 'csrftoken';
      var cookies = document.cookie ? document.cookie.split(';') : [];
      for (var i = 0; i < cookies.length; i++) {
        var parts = cookies[i].split('=');
        if (parts[0].trim() === name) return decodeURIComponent(parts.slice(1).join('=').trim());
      }
      return '';
    }
    var form = document.getElementById('feedback-bouquet-wish-form');
    if (!form) return;
    form.addEventListener('submit', function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      var wrap = form.closest('.index-bouquet-wish-8march__form-wrap');
      if (wrap) {
        var old = wrap.querySelector('.form-message--success');
        if (old) old.remove();
        wrap.querySelectorAll('.error-text').forEach(function(n){ n.remove(); });
        wrap.querySelectorAll('.form-group--error').forEach(function(n){ n.classList.remove('form-group--error'); });
      }
      var pageUrl = form.querySelector('input[name="page_url"]');
      if (pageUrl) pageUrl.value = window.location.href.split('?')[0];
      var msg = form.querySelector('[name="message"]');
      var date = form.querySelector('[name="delivery_date"]');
      if (msg && date && date.value) msg.value = 'Дата доставки: ' + date.value + '\n\n' + (msg.value || '').trim();
      var body = new URLSearchParams(new FormData(form)).toString();
      var headers = { 'X-Requested-With': 'XMLHttpRequest', 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' };
      var csrf = getCsrfToken(); if (csrf) headers['X-CSRFToken'] = csrf;
      fetch(form.action, {
        method: 'POST',
        headers: headers,
        body: body
      }).then(function(r){
        if (r.redirected && r.url !== form.action) { window.location = r.url; return null; }
        return r.json().catch(function(){ return { success: false, errors: { __all__: ['Ошибка ответа сервера'] }; });
      }).then(function(data){
        if (!data) return;
        if (data.success) {
          form.querySelectorAll('input:not([type="hidden"]), textarea').forEach(function(el){ el.value = ''; });
          var cb = form.querySelector('input[type="checkbox"]'); if (cb) cb.checked = false;
          var text = data.msg || 'Ваше сообщение отправлено!';
          if (wrap) {
            var p = document.createElement('p');
            p.className = 'form-message--success';
            p.style.margin = '0 0 0.75rem'; p.style.color = '#2d7a2d';
            p.textContent = text;
            wrap.insertBefore(p, form);
            wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        } else if (data.errors) {
          for (var k in data.errors) {
            var v = data.errors[k];
            var errText = Array.isArray(v) ? v.join(' ') : String(v);
            var input = form.querySelector('[name="'+k+'"]');
            var group = input ? input.closest('.form-group') : form.querySelector('.form-group');
            if (group) {
              group.classList.add('form-group--error');
              var s = document.createElement('span'); s.className = 'error-text'; s.textContent = errText;
              group.appendChild(s);
            }
          }
        }
      }).catch(function(){
        var group = form.querySelector('.form-group') || form;
        group.classList.add('form-group--error');
        var s = document.createElement('span'); s.className = 'error-text'; s.textContent = 'Ошибка отправки. Попробуйте позже или позвоните нам.';
        group.appendChild(s);
      });
      return false;
    }, true);
  })();
  </script>
</div>
