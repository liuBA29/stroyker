{% load static sekizai_tags utils_tags i18n common_tags %}
{# Форма «Остались вопросы?» для футера 8 марта: 4 поля (имя, телефон, e-mail, вопрос). #}
<section class="feedback-form feedback-form--8march-footer" aria-labelledby="feedback-form-8march-title">
    <div class="feedback-form--8march-footer__inner">
        <form action="{% url 'crm:feedback-message-request' %}"
              method="post"
              id="feedback-message-request-form-8march"
              class="feedback-form--8march-footer__form"
              onsubmit="{% render_yandex_metrika_goal config.YMETRICA_GOAL_FORM_FEEDBACK %}">
            {% csrf_token %}
            {% for f in form.hidden_fields %}{{ f }}{% endfor %}

            <div class="feedback-form--8march-footer__grid">
                <label class="feedback-form--8march-footer__field">
                    <span class="feedback-form--8march-footer__label" aria-hidden="true">Ваше имя</span>
                    <input type="text" name="name" class="feedback-form--8march-footer__input" required autocomplete="name" placeholder="Ваше имя">
                </label>
                <label class="feedback-form--8march-footer__field">
                    <span class="feedback-form--8march-footer__label" aria-hidden="true">E-mail</span>
                    <input type="email" name="email" class="feedback-form--8march-footer__input" required autocomplete="email" placeholder="E-mail">
                </label>
                <label class="feedback-form--8march-footer__field">
                    <span class="feedback-form--8march-footer__label" aria-hidden="true">Номер телефона</span>
                    <input type="tel" name="phone" class="feedback-form--8march-footer__input feedback-form--8march-footer__input--phone phone" required autocomplete="tel" placeholder="+7 (999) 999-99-99">
                </label>
                <label class="feedback-form--8march-footer__field">
                    <span class="feedback-form--8march-footer__label" aria-hidden="true">Ваш вопрос</span>
                    <textarea name="message" class="feedback-form--8march-footer__input feedback-form--8march-footer__textarea" required rows="3" placeholder="Ваш вопрос"></textarea>
                </label>
            </div>

            <div class="feedback-form--8march-footer__row">
                <button type="submit" class="feedback-form--8march-footer__submit black-button">ОТПРАВИТЬ</button>
                <div class="form-group privacy-policy agree-one">
                    <div class="checkbox">
                        <input type="checkbox" name="privacy-policy" id="privacy-feedback-8march" required autocomplete="off" class="white-checkbox"/>
                        <label for="privacy-feedback-8march">Нажимая на кнопку, вы даете согласие на обработку<br>персональных данных и рекламную рассылку,<br>
    и соглашаетесь с нашей <a href="{% url 'staticpages:staticpage' 'privacy-policy' %}">политикой конфиденциальности</a></label>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
<script>
(function(){
  function getCsrfToken() {
    var name = 'csrftoken';
    var cookies = document.cookie ? document.cookie.split(';') : [];
    for (var i = 0; i < cookies.length; i++) {
      var parts = cookies[i].split('=');
      if (parts[0].trim() === name) return decodeURIComponent(parts.slice(1).join('=').trim());
    }
    return '';
  }
  var form = document.getElementById('feedback-message-request-form-8march');
  if (!form) return;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    e.stopImmediatePropagation();
    var wrap = form.closest('.feedback-form--8march-footer__inner');
    if (wrap) {
      var old = wrap.querySelector('.form-message--success');
      if (old) old.remove();
      wrap.querySelectorAll('.error-text').forEach(function(n){ n.remove(); });
      wrap.querySelectorAll('.form-group--error').forEach(function(n){ n.classList.remove('form-group--error'); });
    }
    var pageUrl = form.querySelector('input[name="page_url"]');
    if (pageUrl) pageUrl.value = window.location.href.split('?')[0];
    var body = new URLSearchParams(new FormData(form)).toString();
    var headers = { 'X-Requested-With': 'XMLHttpRequest', 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' };
    var csrf = getCsrfToken(); if (csrf) headers['X-CSRFToken'] = csrf;
    fetch(form.action, {
      method: 'POST',
      headers: headers,
      body: body
    }).then(function(r){
      if (r.redirected && r.url !== form.action) { window.location = r.url; return null; }
      return r.json().catch(function(){ return { success: false, errors: { __all__: ['Ошибка ответа сервера'] }; });
    }).then(function(data){
      if (!data) return;
      if (data.success) {
        form.querySelectorAll('input:not([type="hidden"]), textarea').forEach(function(el){ el.value = ''; });
        var cb = form.querySelector('input[type="checkbox"]'); if (cb) cb.checked = false;
        var text = data.msg || 'Ваше сообщение отправлено!';
        if (wrap) {
          var p = document.createElement('p');
          p.className = 'form-message--success';
          p.style.margin = '0 0 0.75rem'; p.style.color = '#2d7a2d';
          p.textContent = text;
          wrap.insertBefore(p, form);
          wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      } else if (data.errors) {
        for (var k in data.errors) {
          var v = data.errors[k];
          var errText = Array.isArray(v) ? v.join(' ') : String(v);
          var input = form.querySelector('[name="'+k+'"]');
          var group = input ? (input.closest('.form-group') || input.closest('.feedback-form--8march-footer__field')) : (wrap ? wrap.querySelector('.feedback-form--8march-footer__row') : null);
          if (group) {
            group.classList.add('form-group--error');
            var s = document.createElement('span'); s.className = 'error-text'; s.textContent = errText;
            group.appendChild(s);
          }
        }
      }
    }).catch(function(){
      if (wrap) {
        var group = wrap.querySelector('.feedback-form--8march-footer__row') || wrap;
        group.classList.add('form-group--error');
        var s = document.createElement('span'); s.className = 'error-text'; s.textContent = 'Ошибка отправки. Попробуйте позже или позвоните нам.';
        group.appendChild(s);
      }
    });
    return false;
  }, true);
})();
</script>
