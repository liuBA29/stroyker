{% extends 'base.html' %}
{% load static crm_tags customization_tags %}
{% block body_main %}
<div class="page-index-8march-content">
  {% render_tag_container 'new_design_middle' 'additional-section' %}
</div>

{% render_tag_container 'new_design_bottom' 'additional-section' %}
{% endblock body_main %}

{% block other_js %}
<script src="{% static '8march_design/js/8march_carousel.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ru.js" crossorigin="anonymous"></script>
<script>
(function() {
  var link = document.querySelector('.index-8march-map-overlay__address[data-scroll-to-map]');
  var mapEl = document.getElementById('yamap_addresses');
  if (link && mapEl) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      mapEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
})();
</script>
<script>
(function() {
  function init() {
    var promoWraps = document.querySelectorAll('.index-promo-8march__carousel-wrap');
    if (!promoWraps.length) return;
    promoWraps.forEach(function(promoWrap) {
      var isSalesSlider = promoWrap.closest('.new_spring_design_sales_slider');
      if (isSalesSlider && typeof initSalesSliderCarousel === 'function') {
        initSalesSliderCarousel(promoWrap);
        return;
      }
      if (typeof init8marchCarousel === 'function') {
        var opts = {
          trackSelector: '.index-promo-8march__track',
          prevSelector: '.index-promo-8march__arrow--prev',
          nextSelector: '.index-promo-8march__arrow--next',
          cardSelector: '.index-promo-8march__card',
          cardLargeClass: 'index-promo-8march__card--large',
          gap: 20,
          smallW: 260,
          largeW: 377,
          breakpoints: [
            { minWidth: 1600, smallW: 320, largeW: 462 },
            { minWidth: 768, smallW: 260, largeW: 377 },
            { minWidth: 0, smallW: Math.max(220, window.innerWidth - 40), largeW: Math.max(220, window.innerWidth - 40) }
          ]
        };
        init8marchCarousel(promoWrap, opts);
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
<script>
(function() {
  var form = document.getElementById('feedback-bouquet-wish-form');
  if (!form) return;
  var phoneInput = form.querySelector('.index-bouquet-wish-8march__input--phone');
  if (!phoneInput) return;
  function formatPhoneMask(value) {
    var digits = (value || '').replace(/\D/g, '');
    if (digits.charAt(0) === '8') digits = '7' + digits.slice(1);
    if (digits.charAt(0) !== '7') digits = '7' + digits;
    digits = digits.slice(0, 11);
    if (digits.length === 0) return '';
    if (digits.length <= 1) return '+7';
    if (digits.length <= 4) return '+7 (' + digits.slice(1);
    if (digits.length <= 7) return '+7 (' + digits.slice(1, 4) + ') ' + digits.slice(4);
    return '+7 (' + digits.slice(1, 4) + ') ' + digits.slice(4, 7) + '-' + digits.slice(7, 9) + '-' + digits.slice(9, 11);
  }
  function onPhoneInput(e) {
    var pos = phoneInput.selectionStart;
    var oldLen = phoneInput.value.length;
    var formatted = formatPhoneMask(phoneInput.value);
    phoneInput.value = formatted;
    var newLen = formatted.length;
    var newPos = Math.max(0, pos + (newLen - oldLen));
    phoneInput.setSelectionRange(newPos, newPos);
  }
  phoneInput.addEventListener('input', onPhoneInput);
  phoneInput.addEventListener('paste', function(e) {
    e.preventDefault();
    var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    if (pasted.charAt(0) === '8') pasted = '7' + pasted.slice(1);
    if (pasted.charAt(0) !== '7') pasted = '7' + pasted;
    phoneInput.value = formatPhoneMask(pasted);
  });
})();
</script>
<script>
(function() {
  var dateInput = document.getElementById('feedback-bouquet-wish-delivery-date');
  var trigger = document.querySelector('.index-bouquet-wish-8march__field-icon--date-trigger');
  if (!dateInput || typeof flatpickr === 'undefined') return;
  var fp = flatpickr(dateInput, {
    locale: 'ru',
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'j F Y',
    altInputClass: 'index-bouquet-wish-8march__input',
    allowInput: false,
    disableMobile: true
  });
  if (trigger && fp) {
    trigger.addEventListener('click', function() { fp.open(); });
  }
})();
</script>
{% endblock other_js %}
