{% load static banner_tags catalog_tags i18n %}
<span class="content-title content-title--white content-title--mobile-black">
    {% trans "Хиты продаж" %}
</span>
<div class="product-slider">
    {% render_banners %}
    <div class="product-slider--3">
        <div class="slider-constructor" {% slider_constructor_dataset %}>
            {% for product in products %}
            {% render_product_teaser_new product %}
            {% endfor %}
        </div>
        <div class="btn-center mobile-show">
            <a class="btn-download btn-download-1">
                <span class="icon"><img src="{% static 'images/download-productions.svg' %}" alt="">
                </span>
                {% trans "Ещё" %}
            </a>
        </div>

    </div>
</div>
