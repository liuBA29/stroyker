{% if product %}
<div class="documents">
    {% for doc in product.certificates.all %}
    <div class="document-item">
        <div class="document-item__text"><a download href="{{ doc.file.url }}" class="document-item__text-link">
            {{ doc.name }}
          </a></div>
        <div class="document-item__format">{{ doc.file_extension }}</div>
        <div class="document-item__size">{{ doc.file_size }}</div>
        <div class="document-item__btn d-md-block d-none d-md-block d-none"><a href="{{ doc.file.url }}" class="document-item__btn-download btn" download><svg class="document-item__download-icon" width="18" height="19" viewBox="0 0 18 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14.71 8.79L13.29 7.37L10 10.66V0H8V10.66L4.71 7.37L3.29 8.79L9 14.49L14.71 8.79ZM0 17V19H18V17H0Z" fill="currentColor"></path>
          </svg>Скачать</a></div>
    </div>
    {% empty %}
    <p>Документация для данного товара временно отсутствует.</p>
    {% endfor %}
</div>
{% endif %}
