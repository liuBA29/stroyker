{% load static commerce_tags %}
{# Мобильное нижнее меню 8march — показывается при USE_8MARCH_HEADER_FOOTER на всех страницах. #}
<nav class="mobile-bottom-nav-8march" aria-label="Основная навигация">
    <a href="/" class="mobile-bottom-nav-8march__item mobile-bottom-nav-8march__item--main">
        <span class="mobile-bottom-nav-8march__icon mobile-bottom-nav-8march__icon--home-smile" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M8 14.5q4 3 8 0" fill="none"/></svg>
        </span>
        <span class="mobile-bottom-nav-8march__label">Главная</span>
    </a>
    <a href="{% url 'catalog:index' %}" class="mobile-bottom-nav-8march__item">
        <span class="mobile-bottom-nav-8march__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </span>
        <span class="mobile-bottom-nav-8march__label">Каталог</span>
    </a>
    <a href="{% url 'staticpages:staticpage' 'delivery' %}" class="mobile-bottom-nav-8march__item">
        <span class="mobile-bottom-nav-8march__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </span>
        <span class="mobile-bottom-nav-8march__label">Доставка</span>
    </a>
    <a href="{% url 'staticpages:staticpage' 'clients' %}" class="mobile-bottom-nav-8march__item">
        <span class="mobile-bottom-nav-8march__icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><clipPath id="client-icon-circle"><circle cx="12" cy="12" r="10"/></clipPath></defs><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor"/><g clip-path="url(#client-icon-circle)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor"/><circle cx="12" cy="8" r="3" fill="none" stroke="currentColor"/></g></svg>
        </span>
        <span class="mobile-bottom-nav-8march__label">Клиентам</span>
    </a>
    <a href="{% url 'cart:cart' %}" class="mobile-bottom-nav-8march__item">
        <span class="mobile-bottom-nav-8march__icon mobile-bottom-nav-8march__icon--cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            {% cart_count_products as cart_count_8march %}{% if cart_count_8march %}<span class="mobile-bottom-nav-8march__badge">{{ cart_count_8march }}</span>{% endif %}
        </span>
        <span class="mobile-bottom-nav-8march__label">Корзина</span>
    </a>
</nav>
<script>
(function() {
    var nav = document.querySelector('.mobile-bottom-nav-8march');
    if (!nav) return;
    var lastScrollY = 0;
    var ticking = false;
    function updateNav() {
        var w = window.innerWidth;
        if (w >= 768) { nav.classList.remove('mobile-bottom-nav-8march--hidden'); return; }
        var y = window.pageYOffset || document.documentElement.scrollTop;
        if (y <= 60) nav.classList.remove('mobile-bottom-nav-8march--hidden');
        else if (y > lastScrollY) nav.classList.add('mobile-bottom-nav-8march--hidden');
        else nav.classList.remove('mobile-bottom-nav-8march--hidden');
        lastScrollY = y;
        ticking = false;
    }
    function onScroll() {
        if (!ticking) {
            requestAnimationFrame(updateNav);
            ticking = true;
        }
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', updateNav);
})();
</script>
