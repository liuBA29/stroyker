{% load static %}
<section class="__header __header--8march header-8march">
    <div class="header-8march__bar">
        <div class="header-8march__left">
            <div class="header-8march__dropdown-wrap">
                <button type="button" class="header-8march__menu-trigger" aria-label="Меню" aria-haspopup="true" data-header-8march-drawer-open>
                    <svg class="header-8march__burger-icon" width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect width="18" height="2" fill="currentColor"/><rect y="6" width="18" height="2" fill="currentColor"/><rect y="12" width="12" height="2" fill="currentColor"/>
                    </svg>
                    <span class="header-8march__label">МЕНЮ</span>
                </button>
                <ul class="header-8march__dropdown" aria-label="Меню">
                    <li><a href="{% url 'staticpages:staticpage' url='about' %}">О студии</a></li>
                    <li><a href="{% url 'staticpages:staticpage' url='services' %}">Услуги</a></li>
                    <li><a href="{% url 'staticpages:staticpage' url='delivery' %}">Доставка</a></li>
                    <li><a href="{% url 'staticpages:staticpage' url='bouquet-care' %}">Совет по уходу</a></li>
                    <li><a href="{% url 'staticpages:staticpage' url='reviews' %}">Отзывы</a></li>
                    <li><a href="{% url 'staticpages:staticpage' url='contacts' %}">Контакты</a></li>
                    <li><a href="{% url 'staticpages:staticpage' url='requisites' %}">Реквизиты</a></li>
                </ul>
            </div>
            <a href="{% url 'catalog:index' %}" class="header-8march__label header-8march__label--catalog">КАТАЛОГ</a>
        </div>
        <div class="header-8march__center">
            <a href="/" class="header-8march__logo">
                <img src="{% if header_logo_url %}{{ header_logo_url }}{% else %}{% static '8march_design/images/LUCIANO/Logo.svg' %}{% endif %}" alt="LUCIANO">
            </a>
        </div>
        <div class="header-8march__right">
            <div class="header-8march__phone">
                <span class="header-8march__phone-icon" aria-hidden="true">
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span class="header-8march__phone-inner">
                    {% if header_phone %}<a href="tel:{{ header_phone|cut:' '|cut:'('|cut:')'|cut:'-' }}">{{ header_phone }}</a>{% else %}<a href="tel:+79179500606">+7 (917) 950-06-06</a>{% endif %}
                </span>
            </div>
            <a href="{% url 'cart:cart' %}" class="header-8march__cart" aria-label="Корзина">
                <span class="header-8march__cart-icon" aria-hidden="true">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                        <path d="M18 6h-2c0-2.21-1.79-4-4-4S8 3.79 8 6H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-2c1.1 0 2 .9 2 2h-4c0-1.1.9-2 2-2zm6 16H6V8h2v2c0 .55.45 1 1 1s1-.45 1-1V8h4v2c0 .55.45 1 1 1s1-.45 1-1V8h2v12z" fill="currentColor"/>
                    </svg>
                </span>
                <span class="header-8march__cart-count">{{ cart_count|default:0 }}</span>
            </a>
        </div>
    </div>
    <div class="header-8march__drawer" id="header-8march-drawer" aria-hidden="true">
        <div class="header-8march__drawer-overlay" data-header-8march-drawer-close></div>
        <div class="header-8march__drawer-panel">
            <button type="button" class="header-8march__drawer-close" aria-label="Закрыть меню" data-header-8march-drawer-close>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <nav class="header-8march__drawer-nav">
                <a href="{% url 'staticpages:staticpage' url='about' %}">О студии</a>
                <a href="{% url 'staticpages:staticpage' url='services' %}">Услуги</a>
                <a href="{% url 'staticpages:staticpage' url='delivery' %}">Доставка</a>
                <a href="{% url 'staticpages:staticpage' url='bouquet-care' %}">Совет по уходу</a>
                <a href="{% url 'staticpages:staticpage' url='reviews' %}">Отзывы</a>
                <a href="{% url 'staticpages:staticpage' url='contacts' %}">Контакты</a>
                <a href="{% url 'staticpages:staticpage' url='requisites' %}">Реквизиты</a>
            </nav>
        </div>
    </div>
</section>
<script>
(function() {
    var drawer = document.getElementById('header-8march-drawer');
    if (!drawer) return;
    var openBtn = document.querySelector('[data-header-8march-drawer-open]');
    var closeBtns = document.querySelectorAll('[data-header-8march-drawer-close]');
    function isMobile() { return window.innerWidth < 768; }
    function openDrawer() {
        drawer.classList.add('header-8march__drawer--open');
        drawer.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
        drawer.classList.remove('header-8march__drawer--open');
        drawer.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }
    if (openBtn) {
        openBtn.addEventListener('click', function(e) {
            if (isMobile()) {
                e.preventDefault();
                openDrawer();
            }
        });
    }
    closeBtns.forEach(function(btn) { btn.addEventListener('click', closeDrawer); });
    window.addEventListener('resize', function() { if (!isMobile()) closeDrawer(); });
})();
</script>
