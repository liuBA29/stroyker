{% load i18n %}
<div class="modal fancybox-content" style="display: inline-block;">
    <div class="sent-successfully">
        <span class="content-title content-title--min center content-title--margin">{% trans "Сообщение отправлено!" %}</span>
        <a class="btn btn--main btn-close" data-fancybox-close="">{% trans "Закрыть" %}</a>
    </div>

    <button type="button" data-fancybox-close="" class="fancybox-button fancybox-close-small" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" version="1" viewBox="0 0 24 24">
            <path d="M13 12l5-5-1-1-5 5-5-5-1 1 5 5-5 5 1 1 5-5 5 5 1-1z"></path>
        </svg>
    </button>
</div>
